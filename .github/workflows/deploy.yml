name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Backend Docker Image
      - name: Build Backend Docker Image
        run: docker build -t pm-backend ./backend

      # Step 4: Build Frontend Docker Image
      - name: Build Frontend Docker Image
        run: docker build -t pm-frontend ./frontend

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      # Step 5: Trigger backend deployment on Render
      - name: Deploy Backend to Render
        run: |
          echo "Triggering Render Deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # Step 6: Frontend deploy handled by Vercel
      - name: Deploy Frontend to Vercel
        run: |
          echo "Vercel auto-deploys from GitHub on push"