version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pm_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: pm_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/project_management
      - JWT_SECRET=supersecretjwtkey
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: pm_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
